<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>自動シフト生成アプリ 試作版</title>
<style>
:root{
  --bg:#f7f4ef;
  --card:#fffaf2;
  --ink:#2a241d;
  --muted:#74685d;
  --line:#e5d8c6;
  --accent:#9b6b3d;
  --accent2:#d9a15f;
  --danger:#c64545;
  --ok:#387a55;
  --warn:#aa7a17;
  --soft:#f0e4d4;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  background:linear-gradient(180deg,#fff8ee 0%,var(--bg) 42%,#efe5d8 100%);
  color:var(--ink);
}
header{
  position:sticky;top:0;z-index:20;
  background:rgba(255,250,242,.94);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
  padding:12px 14px;
}
h1{font-size:18px;margin:0 0 4px;font-weight:800}
.sub{font-size:12px;color:var(--muted)}
main{padding:14px;max-width:980px;margin:0 auto 70px}
.card{
  background:rgba(255,250,242,.92);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 8px 24px rgba(78,54,31,.08);
}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button,select,input{
  font:inherit;
  border-radius:12px;
  border:1px solid var(--line);
  background:white;
  color:var(--ink);
  padding:10px 12px;
}
button{
  background:var(--accent);
  color:white;
  border:0;
  font-weight:700;
  box-shadow:0 4px 12px rgba(155,107,61,.22);
}
button.secondary{background:#fff;color:var(--accent);border:1px solid var(--line);box-shadow:none}
button.danger{background:var(--danger)}
button.ok{background:var(--ok)}
button:active{transform:scale(.99)}
input[type="password"], input[type="text"]{width:100%}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.tabs button{font-size:12px;padding:10px 6px;background:#fff;color:var(--muted);border:1px solid var(--line);box-shadow:none}
.tabs button.active{background:var(--accent);color:white;border-color:var(--accent)}
.hidden{display:none!important}
.notice{font-size:13px;color:var(--muted);line-height:1.7}
.badge{display:inline-flex;padding:3px 8px;border-radius:999px;background:var(--soft);font-size:12px;color:var(--muted)}
.warn{color:var(--warn);font-weight:700}
.dangerText{color:var(--danger);font-weight:700}
.okText{color:var(--ok);font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(2,1fr)}}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:white}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}
th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px;min-width:54px;text-align:center;white-space:nowrap}
th:first-child,td:first-child{position:sticky;left:0;background:#fff;z-index:2;min-width:68px;font-weight:800}
thead th{position:sticky;top:0;background:#fbf1e4;z-index:3}
thead th:first-child{z-index:4}
.weekend{background:#fff0f0!important}
.sat{background:#f0f6ff!important}
.off{background:#eee;color:#777}
.work{background:#fff7dd}
.late{background:#edf7ee}
.last{background:#f2edff}
.small{font-size:11px;color:var(--muted)}
.staffPill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;background:#f3eadf;margin:2px;font-size:12px}
.dayList{display:grid;gap:8px}
.shiftItem{display:flex;justify-content:space-between;gap:8px;background:white;border:1px solid var(--line);border-radius:14px;padding:10px}
.shiftItem strong{font-size:15px}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi div{background:white;border:1px solid var(--line);border-radius:14px;padding:10px}
.kpi b{display:block;font-size:18px}
@media(max-width:680px){.kpi{grid-template-columns:1fr}}
.footerNav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(255,250,242,.96);
  border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  padding:6px max(6px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-right));
}
.footerNav button{border-radius:12px;background:transparent;color:var(--muted);box-shadow:none;font-size:11px;padding:8px 4px}
.footerNav button.active{background:var(--accent);color:white}
</style>
</head>
<body>
<header>
  <h1>自動シフト生成アプリ 試作版</h1>
  <div class="sub">1人管理モード / 希望休提出モード / 月間・日別表示 / 予定勤務時間</div>
</header>

<main>
  <section id="loginCard" class="card hidden">
    <h2 style="margin-top:0">管理者ログイン</h2>
    <p class="notice">管理者パスは <b>1231</b>。iPhoneだけで見られる試作版なので、保存はこの端末のSafari内だけです。</p>
    <input id="pass" type="password" placeholder="管理者pass" inputmode="numeric">
    <div class="row" style="margin-top:10px">
      <button onclick="login()">ログイン</button>
      <button class="secondary" onclick="enterViewer()">閲覧だけ</button>
    </div>
  </section>

  <section id="app">
    <div class="card">
      <div class="row">
        <span class="badge" id="modeBadge">管理者</span>
        <select id="monthSelect" onchange="buildPeriod(); renderAll();">
          <option value="2026-05-11">2026/5/11〜6/10</option>
          <option value="2026-06-11">2026/6/11〜7/10</option>
          <option value="2026-07-11">2026/7/11〜8/10</option>
        </select>
        <button class="secondary" onclick="saveAll()">保存</button>
        <button class="secondary" onclick="resetAll()">初期化</button>
      </div>
      <p class="notice" style="margin-bottom:0">人数不足は画面に出さず、自動生成の裏側で意識します。まずは動き確認用の試作です。</p>
    </div>

    <section id="panelInput" class="panel card">
      <h2 style="margin-top:0">希望入力</h2>
      <div class="tabs">
        <button id="tabSolo" class="active" onclick="setInputMode('solo')">1人管理</button>
        <button id="tabSubmit" onclick="setInputMode('submit')">希望提出</button>
        <button class="secondary" onclick="fillSampleRequests()">サンプル入力</button>
        <button class="ok" onclick="generateSchedule()">自動生成</button>
      </div>
      <p id="inputHelp" class="notice"></p>
      <div class="tableWrap"><table id="requestTable"></table></div>
    </section>

    <section id="panelMonth" class="panel card hidden">
      <h2 style="margin-top:0">月間シフト</h2>
      <div class="row" style="margin-bottom:10px">
        <button class="ok" onclick="generateSchedule()">自動生成</button>
        <button class="secondary" onclick="copyMonthText()">月間をコピー</button>
      </div>
      <div class="tableWrap"><table id="monthTable"></table></div>
    </section>

    <section id="panelDay" class="panel card hidden">
      <h2 style="margin-top:0">日別シフト</h2>
      <div class="row" style="margin-bottom:10px">
        <select id="daySelect" onchange="renderDay()"></select>
      </div>
      <div id="daySummary" class="kpi"></div>
      <div id="dayList" class="dayList" style="margin-top:10px"></div>
    </section>

    <section id="panelHours" class="panel card hidden">
      <h2 style="margin-top:0">勤務時間・警告</h2>
      <div class="grid2">
        <div>
          <h3>予定勤務時間</h3>
          <div class="tableWrap"><table id="hoursTable"></table></div>
        </div>
        <div>
          <h3>警告</h3>
          <div id="warnings"></div>
        </div>
      </div>
      <div class="card" style="background:white">
        <h3 style="margin-top:0">スマレジ連携メモ</h3>
        <p class="notice">このiPhone版では、PDFの中身解析はまだ入れていません。次の段階で、スマレジPDFサンプルを見て「実働時間」「現状何時間働いたか」を取り込む作りにします。</p>
        <input type="file" accept="application/pdf,.csv" disabled>
      </div>
    </section>
  </section>
</main>

<nav id="nav" class="footerNav">
  <button id="navInput" class="active" onclick="showPanel('Input')">希望入力</button>
  <button id="navMonth" onclick="showPanel('Month')">月間</button>
  <button id="navDay" onclick="showPanel('Day')">日別</button>
  <button id="navHours" onclick="showPanel('Hours')">時間</button>
</nav>

<script>
const ADMIN_PASS = "1231";
const staff = [
 {id:"a", group:"社員", half:false, maxStreak:5, minOff:8, base:["11"]},
 {id:"b", group:"社員", half:false, maxStreak:5, minOff:8, base:["13","15"]},
 {id:"c", group:"社員", half:false, maxStreak:5, minOff:8, base:["13","15"]},
 {id:"d", group:"セッティング", half:false, maxStreak:5, preferWeekend:true},
 {id:"e", group:"セッティング", half:false, maxStreak:5, minOff:9, preferWeekend:true},
 {id:"f", group:"平日昼", half:false, maxStreak:5, noWeekend:true, until:"17"},
 {id:"g", group:"平日昼", half:true, maxStreak:5, noWeekend:true, until:"16"},
 {id:"h", group:"調整", half:false, maxStreak:4, minOff:8, closer:true},
 {id:"i", group:"調整", half:false, maxStreak:4, minOff:8, closer:true},
 {id:"j", group:"提出型", half:false, maxStreak:5, from:"18", jp:true},
 {id:"k", group:"提出型", half:false, maxStreak:5, fromWeekday:"17", fromWeekend:"11", target:10, closer:true, jp:true},
 {id:"l", group:"提出型", half:false, maxStreak:5, from:"18", jp:true},
 {id:"m", group:"提出型", half:false, maxStreak:5, from:"17", closer:true, jp:true},
 {id:"n", group:"提出型", half:false, maxStreak:5, from:"16", satFrom:"14", jp:true},
 {id:"o", group:"提出型", half:true, maxStreak:5, from:"17", jp:true},
 {id:"p", group:"提出型", half:true, maxStreak:5, from:"17", jp:true},
];
const reqSoloAI = ["","×","16時まで","17時まで","20時まで","ラストまで"];
const reqSoloJP = ["","○","×","16時まで","17時まで","20時まで","ラストまで"];
const reqSubmit = ["","×","14時〜","16時〜","17時〜","18時〜","16時まで","17時まで","20時まで","ラストまで"];
const shiftPatterns = {
  weekday: [
    {label:"9", start:9, end:17},{label:"9", start:9, end:18},
    {label:"11", start:11, end:20},{label:"13", start:13, end:22},
    {label:"15", start:15, end:22},{label:"17", start:17, end:22},{label:"18", start:18, end:22},
  ],
  weekend: [
    {label:"9", start:9, end:17},{label:"9", start:9, end:18},
    {label:"11", start:11, end:20},{label:"14", start:14, end:23},
    {label:"15", start:15, end:23},{label:"17", start:17, end:23},{label:"18", start:18, end:23},
  ]
};
let dates = [];
let inputMode = "solo";
let requests = {};
let schedule = {};
let isAdmin = false;

function ymd(d){ return d.toISOString().slice(0,10); }
function jpDay(d){ return "日月火水木金土"[d.getDay()]; }
function isWeekend(d){ return d.getDay()===0 || d.getDay()===6; }
function nextMonth10(start){
  const d = new Date(start);
  d.setMonth(d.getMonth()+1);
  d.setDate(10);
  return d;
}
function buildPeriod(){
  const start = new Date(document.getElementById("monthSelect").value+"T00:00:00");
  const end = nextMonth10(start);
  dates=[];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    dates.push(new Date(d));
  }
  document.getElementById("daySelect").innerHTML = dates.map(d=>`<option value="${ymd(d)}">${d.getMonth()+1}/${d.getDate()}（${jpDay(d)}）</option>`).join("");
}
function loadAll(){
  const raw = localStorage.getItem("shift_proto_v1");
  if(raw){
    try{
      const data = JSON.parse(raw);
      requests = data.requests || {};
      schedule = data.schedule || {};
      inputMode = data.inputMode || "solo";
    }catch(e){}
  }
}
function saveAll(){
  localStorage.setItem("shift_proto_v1", JSON.stringify({requests,schedule,inputMode}));
  alert("保存しました");
}
function resetAll(){
  if(!confirm("この端末内の入力とシフトを初期化しますか？")) return;
  requests={}; schedule={};
  localStorage.removeItem("shift_proto_v1");
  renderAll();
}
function login(){
  if(document.getElementById("pass").value !== ADMIN_PASS){ alert("passが違います"); return; }
  isAdmin=true; openApp();
}
function enterViewer(){ isAdmin=false; openApp(); }
function openApp(){
  document.getElementById("loginCard").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");
  document.getElementById("modeBadge").textContent = isAdmin ? "管理者" : "閲覧";
  buildPeriod(); loadAll(); setInputMode(inputMode); renderAll();
}
function showPanel(name){
  ["Input","Month","Day","Hours"].forEach(n=>{
    document.getElementById("panel"+n).classList.toggle("hidden", n!==name);
    document.getElementById("nav"+n).classList.toggle("active", n===name);
  });
  if(name==="Day") renderDay();
  if(name==="Hours") renderHours();
}
function setInputMode(mode){
  inputMode=mode;
  document.getElementById("tabSolo").classList.toggle("active", mode==="solo");
  document.getElementById("tabSubmit").classList.toggle("active", mode==="submit");
  document.getElementById("inputHelp").innerHTML = mode==="solo"
   ? "1人管理：a〜iは <b>×=休み / 空欄=出勤可能</b>、j〜pは <b>○=出勤可能 / 空欄=休み希望</b>。時間指定は選択式です。"
   : "希望提出：全員共通で <b>×=休み / 空欄=出勤可能</b>。<b>○時〜 / ○時まで / ラストまで</b>を選べます。";
  renderRequestTable();
}
function getReq(st, dateKey){
  return (requests[st.id] && requests[st.id][dateKey]) || "";
}
function setReq(stId, dateKey, val){
  if(!requests[stId]) requests[stId]={};
  requests[stId][dateKey]=val;
}
function renderRequestTable(){
  const table = document.getElementById("requestTable");
  const head = `<thead><tr><th>人</th>${dates.map(d=>`<th class="${d.getDay()==6?'sat':d.getDay()==0?'weekend':''}">${d.getMonth()+1}/${d.getDate()}<br>${jpDay(d)}</th>`).join("")}</tr></thead>`;
  const body = staff.map(st=>{
    const opts = inputMode==="submit" ? reqSubmit : (st.jp ? reqSoloJP : reqSoloAI);
    return `<tr><td>${st.id}<br><span class="small">${st.group}</span></td>`+
      dates.map(d=>{
        const key=ymd(d), val=getReq(st,key);
        return `<td class="${d.getDay()==6?'sat':d.getDay()==0?'weekend':''}">
          <select ${isAdmin || inputMode==="submit" ? "" : "disabled"} onchange="setReq('${st.id}','${key}',this.value)">
            ${opts.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o||"空欄"}</option>`).join("")}
          </select>
        </td>`;
      }).join("")+`</tr>`;
  }).join("");
  table.innerHTML=head+"<tbody>"+body+"</tbody>";
}
function requestAllows(st, d, pattern){
  const val = getReq(st, ymd(d));
  if(inputMode==="submit"){
    if(val==="×") return false;
    if(val.includes("時〜")){
      const from = parseInt(val);
      if(pattern.start < from) return false;
    }
    if(val.includes("時まで")){
      const until = parseInt(val);
      if(pattern.end > until) return false;
    }
    return true;
  }
  if(st.jp){
    if(val==="" || val==="×") return false;
    if(val==="○") return true;
  }else{
    if(val==="×") return false;
  }
  if(val.includes("時まで")){
    const until = parseInt(val);
    return pattern.end <= until;
  }
  return true;
}
function staffBasePatterns(st, d){
  const weekend = isWeekend(d);
  let patterns = (weekend?shiftPatterns.weekend:shiftPatterns.weekday).slice();
  const dow=d.getDay();
  if(st.id==="a") patterns = patterns.filter(p=>p.label==="11" || (p.start===11));
  if(st.id==="b" || st.id==="c") patterns = patterns.filter(p=>p.label==="13" || p.label==="15");
  if(st.id==="d") patterns = patterns.filter(p=> weekend ? (p.label==="9") : (p.label==="9" || p.label==="11"));
  if(st.id==="e") patterns = patterns.filter(p=> weekend ? (p.label==="11" || p.label==="9") : (p.label==="11" || p.label==="9"));
  if(st.id==="f") patterns = patterns.filter(p=>!weekend && p.end<=17);
  if(st.id==="g") patterns = patterns.filter(p=>!weekend && p.end<=16);
  if(st.id==="h" || st.id==="i") patterns = patterns.filter(p=> p.start>=15 || p.label==="11" || p.label==="14");
  if(st.id==="j" || st.id==="l") patterns = patterns.filter(p=>p.start>=18);
  if(st.id==="k") patterns = patterns.filter(p=> weekend ? p.start>=11 : p.start>=17);
  if(st.id==="m" || st.id==="o" || st.id==="p") patterns = patterns.filter(p=>p.start>=17);
  if(st.id==="n") patterns = patterns.filter(p=> dow===6 ? p.start>=14 : p.start>=16);
  return patterns;
}
function neededSlots(d){
  return isWeekend(d)
    ? [{s:9,e:11,min:1},{s:11,e:13,min:3},{s:13,e:17,min:4},{s:17,e:20,min:4},{s:20,e:23,min:3}]
    : [{s:9,e:11,min:1},{s:11,e:13,min:3},{s:13,e:15,min:3},{s:15,e:17,min:3},{s:17,e:20,min:4},{s:20,e:22,min:3}];
}
function covers(pattern, slot){ return pattern.start < slot.e && pattern.end > slot.s; }
function personValue(st){ return st.half ? 0.5 : 1; }
function workedConsecutive(stId, dateIndex){
  let c=0;
  for(let i=dateIndex-1;i>=0;i--){
    const key=ymd(dates[i]);
    if(schedule[key] && schedule[key][stId]) c++; else break;
  }
  return c;
}
function countWorkDays(stId){
  return dates.reduce((n,d)=> n + ((schedule[ymd(d)]||{})[stId] ? 1:0),0);
}
function hoursOf(p){ return Math.max(0,p.end-p.start-(p.end-p.start>=6?1:0)); }
function generateSchedule(){
  schedule={};
  dates.forEach((d,idx)=>{
    const key=ymd(d);
    schedule[key]={};
    const weekend=isWeekend(d);
    const chosen = new Set();

    function tryAssign(stId, preferredLabels=[]){
      if(chosen.has(stId)) return false;
      const st=staff.find(x=>x.id===stId);
      if(!st) return false;
      if(workedConsecutive(stId,idx)>=st.maxStreak) return false;
      let pats=staffBasePatterns(st,d).filter(p=>requestAllows(st,d,p));
      if(preferredLabels.length) pats.sort((a,b)=>(preferredLabels.includes(b.label)?1:0)-(preferredLabels.includes(a.label)?1:0));
      if(!pats.length) return false;
      const p=pats[0];
      schedule[key][stId]=p; chosen.add(stId); return true;
    }

    // 9時セッティング
    if(weekend){
      if(!tryAssign("d",["9"])) tryAssign("e",["9"]);
      if(chosen.has("d")) tryAssign("e",["11"]);
    }else{
      tryAssign("f",["9"]);
      if(!Object.values(schedule[key]).some(p=>p.start===9)){
        tryAssign("d",["9"]) || tryAssign("e",["9"]);
      }
    }

    // 社員夜 b/c 優先、aは11
    tryAssign("a",["11"]);
    const bcOK = tryAssign("b",["15","13"]) || tryAssign("c",["15","13"]);
    if(!bcOK){ /* aだけで耐える */ }

    // ラスト候補
    ["h","i","k","m"].some(id=>tryAssign(id, weekend?["17","18","15","14"]:["17","18","15"]));

    // 17時以降の候補
    ["k","m","o","p","j","l","n","h","i"].forEach(id=>tryAssign(id, weekend?["17","18","15","14"]:["17","18","15"]));

    // 足りないスロットを埋める。15時前はh/i調整も許可。
    neededSlots(d).forEach(slot=>{
      let safety=0;
      while(slotCoverage(key,slot)<slot.min && safety++<20){
        let pool = staff.filter(st=>!chosen.has(st.id));
        if(slot.e<=15){
          pool.sort((x,y)=>{
            const hx=(x.id==="h"||x.id==="i")?1:0, hy=(y.id==="h"||y.id==="i")?1:0;
            return hy-hx;
          });
        }else{
          pool.sort((x,y)=> (x.jp? -1:0) - (y.jp? -1:0));
        }
        let assigned=false;
        for(const st of pool){
          if(workedConsecutive(st.id,idx)>=st.maxStreak) continue;
          let pats=staffBasePatterns(st,d).filter(p=>requestAllows(st,d,p) && covers(p,slot));
          if(!pats.length) continue;
          const p=pats[0];
          schedule[key][st.id]=p; chosen.add(st.id); assigned=true; break;
        }
        if(!assigned) break;
      }
    });
  });
  renderAll();
  alert("自動生成しました。月間・日別・時間タブで確認できます。");
}
function slotCoverage(key,slot){
  const day=schedule[key]||{};
  return Object.entries(day).reduce((sum,[id,p])=>{
    if(covers(p,slot)){
      const st=staff.find(s=>s.id===id);
      return sum+personValue(st);
    }
    return sum;
  },0);
}
function fillSampleRequests(){
  requests={};
  dates.forEach((d,idx)=>{
    staff.forEach(st=>{
      if(!requests[st.id]) requests[st.id]={};
      const key=ymd(d);
      if(inputMode==="solo"){
        if(st.jp) requests[st.id][key] = (idx+st.id.charCodeAt(0))%4===0 ? "○" : "";
        else requests[st.id][key] = (idx+st.id.charCodeAt(0))%11===0 ? "×" : "";
      }else{
        requests[st.id][key] = (idx+st.id.charCodeAt(0))%13===0 ? "×" : "";
      }
    });
  });
  renderRequestTable();
}
function renderMonth(){
  const table=document.getElementById("monthTable");
  const head=`<thead><tr><th>人</th>${dates.map(d=>`<th class="${d.getDay()==6?'sat':d.getDay()==0?'weekend':''}">${d.getMonth()+1}/${d.getDate()}<br>${jpDay(d)}</th>`).join("")}</tr></thead>`;
  const body=staff.map(st=>`<tr><td>${st.id}<br><span class="small">${st.group}</span></td>`+
    dates.map(d=>{
      const p=(schedule[ymd(d)]||{})[st.id];
      const cls = !p ? "off" : p.end>=22 ? "last" : p.start>=15 ? "late" : "work";
      return `<td class="${cls} ${d.getDay()==6?'sat':d.getDay()==0?'weekend':''}">${p?p.label:"休"}</td>`;
    }).join("")+`</tr>`).join("");
  table.innerHTML=head+"<tbody>"+body+"</tbody>";
}
function renderDay(){
  const key=document.getElementById("daySelect").value || (dates[0]&&ymd(dates[0]));
  const d=dates.find(x=>ymd(x)===key) || dates[0];
  const day=schedule[key]||{};
  const items=Object.entries(day).sort((a,b)=>a[1].start-b[1].start);
  const total=items.reduce((s,[id,p])=>s+hoursOf(p),0);
  document.getElementById("daySummary").innerHTML = `
    <div><span class="small">出勤人数</span><b>${items.length}</b></div>
    <div><span class="small">予定総時間</span><b>${total}h</b></div>
    <div><span class="small">日付</span><b>${d?d.getMonth()+1+"/"+d.getDate()+"("+jpDay(d)+")":"-"}</b></div>`;
  document.getElementById("dayList").innerHTML = items.length ? items.map(([id,p])=>`
    <div class="shiftItem"><strong>${id}</strong><span>${String(p.start).padStart(2,"0")}:00〜${String(p.end).padStart(2,"0")}:00</span></div>
  `).join("") : `<p class="notice">まだシフトがありません。</p>`;
}
function hoursByStaff(){
  const res={};
  staff.forEach(st=>res[st.id]={month:0,weeks:{}});
  dates.forEach(d=>{
    const key=ymd(d), day=schedule[key]||{};
    const week = getWeekLabel(d);
    Object.entries(day).forEach(([id,p])=>{
      const h=hoursOf(p);
      res[id].month+=h;
      res[id].weeks[week]=(res[id].weeks[week]||0)+h;
    });
  });
  return res;
}
function getWeekLabel(d){
  const start=new Date(d);
  start.setDate(d.getDate()-d.getDay()+1);
  return `${start.getMonth()+1}/${start.getDate()}週`;
}
function renderHours(){
  const res=hoursByStaff();
  const weeks=[...new Set(dates.map(getWeekLabel))];
  document.getElementById("hoursTable").innerHTML =
    `<thead><tr><th>人</th><th>月</th>${weeks.map(w=>`<th>${w}</th>`).join("")}</tr></thead><tbody>`+
    staff.map(st=>`<tr><td>${st.id}</td><td>${res[st.id].month}h</td>${weeks.map(w=>`<td>${res[st.id].weeks[w]||0}h</td>`).join("")}</tr>`).join("")+
    `</tbody>`;
  renderWarnings();
}
function renderWarnings(){
  const warnings=[];
  const res=hoursByStaff();
  dates.forEach((d,idx)=>{
    const key=ymd(d), day=schedule[key]||{};
    const label=`${d.getMonth()+1}/${d.getDate()}(${jpDay(d)})`;
    const hasBCNight = ["b","c"].some(id=>day[id] && day[id].end>=22);
    if(!hasBCNight) warnings.push(`${label}：b/cの夜勤務がありません`);
    const hasCloser = ["h","i","k","m"].some(id=>day[id] && day[id].end>=22);
    if(!hasCloser) warnings.push(`${label}：ラスト候補 h/i/k/m がいません`);
    staff.forEach(st=>{
      if(workedStreakAt(st.id,idx)>st.maxStreak) warnings.push(`${label}：${st.id} が連勤上限超え`);
      const val=getReq(st,key);
      if(day[st.id]){
        if(inputMode==="submit" && val==="×") warnings.push(`${label}：${st.id} が休み希望に入っています`);
        if(inputMode==="solo" && !st.jp && val==="×") warnings.push(`${label}：${st.id} が休み希望に入っています`);
        if(inputMode==="solo" && st.jp && val==="") warnings.push(`${label}：${st.id} が○なしの日に入っています`);
      }
    });
  });
  ["a","b","c"].forEach(id=>{
    const off = dates.length-countWorkDays(id);
    if(off<8) warnings.push(`${id}：月休みが8日未満です（${off}日）`);
    Object.entries(res[id].weeks).forEach(([w,h])=>{ if(h>40) warnings.push(`${id}：${w} が週40時間超え（${h}h）`); });
  });
  document.getElementById("warnings").innerHTML = warnings.length
    ? warnings.slice(0,80).map(w=>`<div class="shiftItem"><span class="dangerText">!</span><span>${w}</span></div>`).join("")
    : `<p class="okText">大きな警告はありません。</p>`;
}
function workedStreakAt(stId, idx){
  let c=0;
  for(let i=idx;i>=0;i--){
    const key=ymd(dates[i]);
    if(schedule[key] && schedule[key][stId]) c++; else break;
  }
  return c;
}
function renderAll(){
  renderRequestTable();
  renderMonth();
  renderDay();
  renderHours();
}
function copyMonthText(){
  let text = "月間シフト\n";
  dates.forEach(d=>{
    const key=ymd(d);
    const items=Object.entries(schedule[key]||{}).sort((a,b)=>a[1].start-b[1].start).map(([id,p])=>`${id}:${p.start}-${p.end}`).join(" / ");
    text += `${d.getMonth()+1}/${d.getDate()}(${jpDay(d)}) ${items}\n`;
  });
  navigator.clipboard.writeText(text).then(()=>alert("コピーしました"));
}
isAdmin = true;
buildPeriod();
loadAll();
setInputMode(inputMode);
renderAll();
</script>
</body>
