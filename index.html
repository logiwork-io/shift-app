<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>シフト生成アプリ v2</title>
<style>
:root{--bg:#f7fbfb;--card:#fff;--ink:#1f2a2c;--muted:#6e7f82;--line:#dceced;--accent:#76c7c9;--accent2:#00a6a6;--soft:#e8f8f8;--danger:#d95656;--ok:#2d8f74;--off:#eef2f2;--work:#fff9e8;--late:#eaf7ff;--last:#edf7f2}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:linear-gradient(#fff,var(--bg));color:var(--ink)}header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);padding:12px 14px;backdrop-filter:blur(12px)}h1{font-size:18px;margin:0 0 4px}.sub,.notice{font-size:12px;color:var(--muted);line-height:1.65}main{padding:12px;margin:0 auto 74px;max-width:1100px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 8px 24px rgba(30,120,125,.08)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}button,select{font:inherit;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:10px 12px}button{border:0;background:var(--accent2);color:#fff;font-weight:800;box-shadow:0 5px 14px rgba(0,166,166,.18)}button.secondary{background:#fff;color:var(--accent2);border:1px solid var(--line);box-shadow:none}button.ghost{background:var(--soft);color:var(--accent2);box-shadow:none}.active{background:var(--accent2)!important;color:#fff!important}.hidden{display:none!important}.badge{padding:4px 9px;border-radius:999px;background:var(--soft);font-size:12px;color:var(--accent2);font-weight:800}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}.tabs button{font-size:12px;padding:10px 4px}.modeChoice{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modeChoice button{min-height:76px;font-size:16px}@media(max-width:560px){.modeChoice,.tabs{grid-template-columns:1fr 1fr}}.footerNav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:6px 6px calc(6px + env(safe-area-inset-bottom))}.footerNav button{border-radius:12px;background:transparent;color:var(--muted);box-shadow:none;font-size:11px;padding:8px 4px}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff;-webkit-overflow-scrolling:touch}.requestWrap{max-height:68vh}table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px;min-width:62px;text-align:center;white-space:nowrap}thead th{position:sticky;top:0;background:#eafafa;z-index:20;box-shadow:0 1px 0 var(--line)}th:first-child,td:first-child{position:sticky;left:0;background:#fff;z-index:12;min-width:58px;font-weight:850}thead th:first-child{z-index:30;background:#eafafa}.sat{background:#f0fbff!important}.sun{background:#fff1f1!important}.small{font-size:10px;color:var(--muted)}select.cellSelect{width:74px;padding:7px 6px;font-size:12px}.timeCell{display:grid;gap:4px;justify-items:center}.timePair{display:flex;gap:3px}.timePair select{width:53px;padding:6px 2px;font-size:11px;border-radius:10px}.monthCompact{display:grid;gap:6px}.monthHeader,.monthRow{display:grid;grid-template-columns:34px repeat(var(--days),minmax(0,1fr));gap:1px}.monthHeader div,.monthRow div{min-width:0;text-align:center;border-radius:4px;padding:2px 0;font-size:8.5px;line-height:1.1;overflow:hidden}.monthHeader div{background:#eafafa;color:#35676b;font-weight:800}.monthRow .name{background:#fff;border:1px solid var(--line);font-weight:850;font-size:10px;padding:3px 0}.mcell{background:#f8fbfb;border:1px solid #eef6f6;color:#9aa}.mcell.work{background:var(--work);color:#5e4a10;font-weight:800}.mcell.late{background:var(--late);color:#1f657d;font-weight:800}.mcell.last{background:var(--last);color:#1e6b52;font-weight:800}.mcell.off{background:var(--off);color:#c3c9c9}.dayList{display:grid;gap:8px}.shiftItem{display:flex;justify-content:space-between;gap:8px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px}.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kpi div{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px}.kpi b{display:block;font-size:18px}.dangerText{color:var(--danger);font-weight:800}.okText{color:var(--ok);font-weight:800}
</style>
</head>
<body>
<header><h1>シフト生成アプリ v2</h1><div class="sub">希望提出2段階入力 / 日付固定 / 月間コンパクト表示</div></header>
<main>
<section class="card"><div class="row"><span class="badge">試作版</span><select id="monthSelect" onchange="buildPeriod();renderAll();"><option value="2026-05-11">2026/5/11〜6/10</option><option value="2026-06-11">2026/6/11〜7/10</option><option value="2026-07-11">2026/7/11〜8/10</option></select><button class="secondary" onclick="saveAll()">保存</button><button class="secondary" onclick="resetAll()">初期化</button></div><p class="notice">白系統メインに、浅葱色・ロビンエッグブルーを差し色にしました。</p></section>
<section id="modeSelectCard" class="card"><h2>最初にモードを選択</h2><p class="notice">最初に「1人管理」か「希望提出」を選べます。あとから切り替えも可能。</p><div class="modeChoice"><button onclick="chooseInputMode('solo')">1人管理で作る</button><button onclick="chooseInputMode('submit')">希望提出で集める</button></div></section>
<section id="panelInput" class="panel card hidden"><h2>希望入力</h2><div class="tabs"><button id="tabSolo" onclick="chooseInputMode('solo')">1人管理</button><button id="tabSubmit" onclick="chooseInputMode('submit')">希望提出</button><button class="ghost" onclick="fillSampleRequests()">サンプル入力</button><button onclick="generateSchedule()">自動生成</button></div><p id="inputHelp" class="notice"></p><div class="tableWrap requestWrap"><table id="requestTable"></table></div></section>
<section id="panelMonth" class="panel card hidden"><h2>月間シフト</h2><p class="notice">横スワイプなしで1枚確認できるコンパクト表示です。</p><div class="row"><button onclick="generateSchedule()">自動生成</button><button class="secondary" onclick="copyMonthText()">月間をコピー</button></div><div id="monthCompact" class="monthCompact"></div></section>
<section id="panelDay" class="panel card hidden"><h2>日別シフト</h2><select id="daySelect" onchange="renderDay()"></select><div id="daySummary" class="kpi" style="margin-top:10px"></div><div id="dayList" class="dayList" style="margin-top:10px"></div></section>
<section id="panelHours" class="panel card hidden"><h2>勤務時間・警告</h2><h3>予定勤務時間</h3><div class="tableWrap"><table id="hoursTable"></table></div><h3>警告</h3><div id="warnings"></div></section>
</main>
<nav class="footerNav"><button id="navInput" class="active" onclick="showPanel('Input')">希望入力</button><button id="navMonth" onclick="showPanel('Month')">月間</button><button id="navDay" onclick="showPanel('Day')">日別</button><button id="navHours" onclick="showPanel('Hours')">時間</button></nav>
<script>
const staff=[["a","社員"],["b","社員"],["c","社員"],["d","設定"],["e","設定"],["f","昼"],["g","昼"],["h","調整"],["i","調整"],["j","提出"],["k","提出"],["l","提出"],["m","提出"],["n","提出"],["o","提出"],["p","提出"]].map(x=>({id:x[0],group:x[1],jp:"jklmnop".includes(x[0]),half:"gop".includes(x[0]),closer:"hikm".includes(x[0]),maxStreak:"hi".includes(x[0])?4:5,minOff:"abc".includes(x[0])?8:(x[0]=="e"?9:0)}));
const hours=Array.from({length:11},(_,i)=>i+9), soloAI=["","×","○","時間"], soloJP=["","○","×","時間"], submitMain=["","×","○","時間"];
const shiftPatterns={weekday:[{label:"9",start:9,end:17},{label:"9",start:9,end:18},{label:"11",start:11,end:20},{label:"13",start:13,end:22},{label:"15",start:15,end:22},{label:"17",start:17,end:22},{label:"18",start:18,end:22}],weekend:[{label:"9",start:9,end:17},{label:"9",start:9,end:18},{label:"11",start:11,end:20},{label:"14",start:14,end:23},{label:"15",start:15,end:23},{label:"17",start:17,end:23},{label:"18",start:18,end:23}]};
let dates=[],inputMode="",requests={},schedule={};
function ymd(d){return d.toISOString().slice(0,10)}function jpDay(d){return"日月火水木金土"[d.getDay()]}function isWeekend(d){return d.getDay()==0||d.getDay()==6}function nextMonth10(s){const d=new Date(s);d.setMonth(d.getMonth()+1);d.setDate(10);return d}
function buildPeriod(){const s=new Date(document.getElementById("monthSelect").value+"T00:00:00"),e=nextMonth10(s);dates=[];for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))dates.push(new Date(d));document.getElementById("daySelect").innerHTML=dates.map(d=>`<option value="${ymd(d)}">${d.getMonth()+1}/${d.getDate()}（${jpDay(d)}）</option>`).join("");document.documentElement.style.setProperty("--days",dates.length)}
function loadAll(){try{const data=JSON.parse(localStorage.getItem("shift_proto_v2")||"{}");requests=data.requests||{};schedule=data.schedule||{};inputMode=data.inputMode||""}catch(e){}}
function saveAll(){localStorage.setItem("shift_proto_v2",JSON.stringify({requests,schedule,inputMode}));alert("保存しました")}function saveQuiet(){localStorage.setItem("shift_proto_v2",JSON.stringify({requests,schedule,inputMode}))}
function resetAll(){if(confirm("初期化しますか？")){requests={};schedule={};inputMode="";localStorage.removeItem("shift_proto_v2");document.getElementById("modeSelectCard").classList.remove("hidden");document.getElementById("panelInput").classList.add("hidden");renderAll()}}
function chooseInputMode(m){inputMode=m;document.getElementById("modeSelectCard").classList.add("hidden");document.getElementById("panelInput").classList.remove("hidden");document.getElementById("tabSolo").classList.toggle("active",m=="solo");document.getElementById("tabSubmit").classList.toggle("active",m=="submit");document.getElementById("inputHelp").innerHTML=m=="solo"?"1人管理：a〜iは×=休み、空欄=出勤可能。j〜pは○=出勤可能、空欄=休み希望。時間は9〜19時＋から/まで。":"希望提出：全員共通で×=休み、○=出勤可能。時間は9〜19時＋から/まで。";renderRequestTable();saveQuiet()}
function showPanel(n){["Input","Month","Day","Hours"].forEach(x=>{document.getElementById("panel"+x).classList.toggle("hidden",x!=n||(x=="Input"&&!inputMode));document.getElementById("nav"+x).classList.toggle("active",x==n)});document.getElementById("modeSelectCard").classList.toggle("hidden",!(n=="Input"&&!inputMode));if(n=="Day")renderDay();if(n=="Hours")renderHours()}
function reqObj(id,key){requests[id]??={};requests[id][key]??={main:"",hour:"17",dir:"from"};if(typeof requests[id][key]=="string")requests[id][key]={main:requests[id][key],hour:"17",dir:"from"};return requests[id][key]}
function setReqMain(id,key,v){reqObj(id,key).main=v}function setReqHour(id,key,v){reqObj(id,key).hour=String(v)}function setReqDir(id,key,v){reqObj(id,key).dir=v}
function renderRequestTable(){if(!inputMode)return;let head=`<thead><tr><th>人</th>${dates.map(d=>`<th class="${d.getDay()==6?'sat':d.getDay()==0?'sun':''}">${d.getMonth()+1}/${d.getDate()}<br>${jpDay(d)}</th>`).join("")}</tr></thead>`;let body=staff.map(st=>{let opts=inputMode=="submit"?submitMain:(st.jp?soloJP:soloAI);return `<tr><td>${st.id}<br><span class=small>${st.group}</span></td>`+dates.map(d=>{let key=ymd(d),r=reqObj(st.id,key);return `<td class="${d.getDay()==6?'sat':d.getDay()==0?'sun':''}"><div class=timeCell><select class=cellSelect onchange="setReqMain('${st.id}','${key}',this.value);renderRequestTable();saveQuiet()">${opts.map(o=>`<option value="${o}" ${o==r.main?'selected':''}>${o||"空欄"}</option>`).join("")}</select>${r.main=="時間"?`<div class=timePair><select onchange="setReqHour('${st.id}','${key}',this.value);saveQuiet()">${hours.map(h=>`<option value="${h}" ${String(h)==String(r.hour)?'selected':''}>${h}時</option>`).join("")}</select><select onchange="setReqDir('${st.id}','${key}',this.value);saveQuiet()"><option value=from ${r.dir=="from"?'selected':''}>から</option><option value=until ${r.dir=="until"?'selected':''}>まで</option></select></div>`:""}</div></td>`}).join("")+"</tr>"}).join("");document.getElementById("requestTable").innerHTML=head+"<tbody>"+body+"</tbody>"}
function requestAllows(st,d,p){let r=reqObj(st.id,ymd(d));if(inputMode=="submit"){if(r.main=="×")return false;if(r.main=="時間"){let h=+r.hour;if(r.dir=="from"&&p.start<h)return false;if(r.dir=="until"&&p.end>h)return false}return true}if(st.jp){if(r.main==""||r.main=="×")return false;if(r.main=="○")return true}else{if(r.main=="×")return false;if(r.main=="○")return true}if(r.main=="時間"){let h=+r.hour;if(r.dir=="from"&&p.start<h)return false;if(r.dir=="until"&&p.end>h)return false}return true}
function basePatterns(st,d){let weekend=isWeekend(d),p=(weekend?shiftPatterns.weekend:shiftPatterns.weekday).slice(),id=st.id,dow=d.getDay();if(id=="a")p=p.filter(x=>x.label=="11");if(id=="b"||id=="c")p=p.filter(x=>x.label=="13"||x.label=="15");if(id=="d")p=p.filter(x=>weekend?x.label=="9":(x.label=="9"||x.label=="11"));if(id=="e")p=p.filter(x=>x.label=="11"||x.label=="9");if(id=="f")p=p.filter(x=>!weekend&&x.end<=17);if(id=="g")p=p.filter(x=>!weekend&&x.end<=16);if(id=="h"||id=="i")p=p.filter(x=>x.start>=15||x.label=="11"||x.label=="14");if(id=="j"||id=="l")p=p.filter(x=>x.start>=18);if(id=="k")p=p.filter(x=>weekend?x.start>=11:x.start>=17);if(id=="m"||id=="o"||id=="p")p=p.filter(x=>x.start>=17);if(id=="n")p=p.filter(x=>dow==6?x.start>=14:x.start>=16);return p}
function needed(d){return isWeekend(d)?[{s:9,e:11,min:1},{s:11,e:13,min:3},{s:13,e:17,min:4},{s:17,e:20,min:4},{s:20,e:23,min:3}]:[{s:9,e:11,min:1},{s:11,e:13,min:3},{s:13,e:15,min:3},{s:15,e:17,min:3},{s:17,e:20,min:4},{s:20,e:22,min:3}]}
function covers(p,s){return p.start<s.e&&p.end>s.s}function val(st){return st.half?.5:1}
function consec(id,idx){let c=0;for(let i=idx-1;i>=0;i--){if(schedule[ymd(dates[i])]?.[id])c++;else break}return c}
function assign(key,idx,d,chosen,id,pref=[]){if(chosen.has(id))return false;let st=staff.find(x=>x.id==id);if(!st||consec(id,idx)>=st.maxStreak)return false;let ps=basePatterns(st,d).filter(p=>requestAllows(st,d,p));if(pref.length)ps.sort((a,b)=>(pref.includes(b.label)?1:0)-(pref.includes(a.label)?1:0));if(!ps.length)return false;schedule[key][id]=ps[0];chosen.add(id);return true}
function coverage(key,slot){return Object.entries(schedule[key]||{}).reduce((s,[id,p])=>s+(covers(p,slot)?val(staff.find(x=>x.id==id)):0),0)}
function generateSchedule(){if(!inputMode){alert("先にモードを選んでください");return}schedule={};dates.forEach((d,idx)=>{let key=ymd(d),weekend=isWeekend(d),chosen=new Set();schedule[key]={};if(weekend){if(!assign(key,idx,d,chosen,"d",["9"]))assign(key,idx,d,chosen,"e",["9"]);if(chosen.has("d"))assign(key,idx,d,chosen,"e",["11"])}else{assign(key,idx,d,chosen,"f",["9"]);if(!Object.values(schedule[key]).some(p=>p.start==9))assign(key,idx,d,chosen,"d",["9"])||assign(key,idx,d,chosen,"e",["9"])}assign(key,idx,d,chosen,"a",["11"]);assign(key,idx,d,chosen,"b",["15","13"])||assign(key,idx,d,chosen,"c",["15","13"]);["h","i","k","m"].some(id=>assign(key,idx,d,chosen,id,weekend?["17","18","15","14"]:["17","18","15"]));["k","m","o","p","j","l","n","h","i"].forEach(id=>assign(key,idx,d,chosen,id,weekend?["17","18","15","14"]:["17","18","15"]));needed(d).forEach(slot=>{let safety=0;while(coverage(key,slot)<slot.min&&safety++<20){let pool=staff.filter(st=>!chosen.has(st.id));if(slot.e<=15)pool.sort((x,y)=>((y.id=="h"||y.id=="i")?1:0)-((x.id=="h"||x.id=="i")?1:0));else pool.sort((x,y)=>(x.jp?-1:0)-(y.jp?-1:0));let ok=false;for(let st of pool){if(consec(st.id,idx)>=st.maxStreak)continue;let ps=basePatterns(st,d).filter(p=>requestAllows(st,d,p)&&covers(p,slot));if(!ps.length)continue;schedule[key][st.id]=ps[0];chosen.add(st.id);ok=true;break}if(!ok)break}})});saveQuiet();renderAll();alert("自動生成しました")}
function fillSampleRequests(){if(!inputMode)chooseInputMode("submit");requests={};dates.forEach((d,idx)=>staff.forEach(st=>{let r=reqObj(st.id,ymd(d));if(inputMode=="submit"){r.main=(idx+st.id.charCodeAt(0))%13==0?"×":((idx+st.id.charCodeAt(0))%9==0?"時間":"○");r.hour=String(9+((idx+st.id.charCodeAt(0))%11));r.dir=idx%2?"until":"from"}else r.main=st.jp?((idx+st.id.charCodeAt(0))%4==0?"○":""):((idx+st.id.charCodeAt(0))%11==0?"×":"")}));renderRequestTable();saveQuiet()}
function renderMonth(){let root=document.getElementById("monthCompact");root.style.setProperty("--days",dates.length);let header=`<div class=monthHeader><div>人</div>${dates.map(d=>`<div>${d.getDate()}<br>${jpDay(d)}</div>`).join("")}</div>`;let rows=staff.map(st=>`<div class=monthRow><div class=name>${st.id}</div>${dates.map(d=>{let p=schedule[ymd(d)]?.[st.id],cls=!p?"off":p.end>=22?"last":p.start>=15?"late":"work";return `<div class="mcell ${cls}">${p?p.label:""}</div>`}).join("")}</div>`).join("");root.innerHTML=header+rows}
function renderDay(){let key=document.getElementById("daySelect").value||(dates[0]&&ymd(dates[0])),d=dates.find(x=>ymd(x)==key)||dates[0],items=Object.entries(schedule[key]||{}).sort((a,b)=>a[1].start-b[1].start),total=items.reduce((s,[id,p])=>s+hoursOf(p),0);document.getElementById("daySummary").innerHTML=`<div><span class=small>出勤人数</span><b>${items.length}</b></div><div><span class=small>予定総時間</span><b>${total}h</b></div><div><span class=small>日付</span><b>${d?d.getMonth()+1+"/"+d.getDate()+"("+jpDay(d)+")":"-"}</b></div>`;document.getElementById("dayList").innerHTML=items.length?items.map(([id,p])=>`<div class=shiftItem><strong>${id}</strong><span>${String(p.start).padStart(2,"0")}:00〜${String(p.end).padStart(2,"0")}:00</span></div>`).join(""):"<p class=notice>まだシフトがありません。</p>"}
function hoursOf(p){return Math.max(0,p.end-p.start-(p.end-p.start>=6?1:0))}function weekLabel(d){let s=new Date(d);s.setDate(d.getDate()-d.getDay()+1);return`${s.getMonth()+1}/${s.getDate()}週`}function hoursByStaff(){let res={};staff.forEach(st=>res[st.id]={month:0,weeks:{}});dates.forEach(d=>{let key=ymd(d),w=weekLabel(d);Object.entries(schedule[key]||{}).forEach(([id,p])=>{let h=hoursOf(p);res[id].month+=h;res[id].weeks[w]=(res[id].weeks[w]||0)+h})});return res}
function countDays(id){return dates.reduce((n,d)=>n+(schedule[ymd(d)]?.[id]?1:0),0)}function streakAt(id,idx){let c=0;for(let i=idx;i>=0;i--){if(schedule[ymd(dates[i])]?.[id])c++;else break}return c}
function renderHours(){let res=hoursByStaff(),weeks=[...new Set(dates.map(weekLabel))];document.getElementById("hoursTable").innerHTML=`<thead><tr><th>人</th><th>月</th>${weeks.map(w=>`<th>${w}</th>`).join("")}</tr></thead><tbody>`+staff.map(st=>`<tr><td>${st.id}</td><td>${res[st.id].month}h</td>${weeks.map(w=>`<td>${res[st.id].weeks[w]||0}h</td>`).join("")}</tr>`).join("")+"</tbody>";renderWarnings()}
function renderWarnings(){let ws=[],res=hoursByStaff();dates.forEach((d,idx)=>{let key=ymd(d),day=schedule[key]||{},label=`${d.getMonth()+1}/${d.getDate()}(${jpDay(d)})`;if(!["b","c"].some(id=>day[id]?.end>=22))ws.push(`${label}：b/cの夜勤務がありません`);if(!["h","i","k","m"].some(id=>day[id]?.end>=22))ws.push(`${label}：ラスト候補 h/i/k/m がいません`);staff.forEach(st=>{if(streakAt(st.id,idx)>st.maxStreak)ws.push(`${label}：${st.id} が連勤上限超え`);let r=reqObj(st.id,key);if(day[st.id]&&r.main=="×")ws.push(`${label}：${st.id} が休み希望に入っています`);if(inputMode=="solo"&&st.jp&&day[st.id]&&r.main=="")ws.push(`${label}：${st.id} が○なしの日に入っています`)})});["a","b","c"].forEach(id=>{let off=dates.length-countDays(id);if(off<8)ws.push(`${id}：月休みが8日未満です（${off}日）`);Object.entries(res[id].weeks).forEach(([w,h])=>{if(h>40)ws.push(`${id}：${w} が週40時間超え（${h}h）`)})});document.getElementById("warnings").innerHTML=ws.length?ws.slice(0,80).map(w=>`<div class=shiftItem><span class=dangerText>!</span><span>${w}</span></div>`).join(""):`<p class=okText>大きな警告はありません。</p>`}
function renderAll(){if(inputMode){document.getElementById("modeSelectCard").classList.add("hidden");document.getElementById("panelInput").classList.remove("hidden");document.getElementById("tabSolo").classList.toggle("active",inputMode=="solo");document.getElementById("tabSubmit").classList.toggle("active",inputMode=="submit");renderRequestTable()}renderMonth();renderDay();renderHours()}
function copyMonthText(){let text="月間シフト\n";dates.forEach(d=>{let key=ymd(d),items=Object.entries(schedule[key]||{}).sort((a,b)=>a[1].start-b[1].start).map(([id,p])=>`${id}:${p.start}-${p.end}`).join(" / ");text+=`${d.getMonth()+1}/${d.getDate()}(${jpDay(d)}) ${items}\n`});navigator.clipboard.writeText(text).then(()=>alert("コピーしました"))}
buildPeriod();loadAll();renderAll();
</script>
